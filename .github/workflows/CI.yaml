name: Jerney Devsecops Pipeline
on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-frontend
  
jobs:
  lint:
    name: "Lint Code"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"
      - name: Install Dependency
        working-directory: ${{ matrix.component }}
        run: npm ci
      - name: Run ESlint
        working-directory: ${{ matrix.component }}
        run: npm run lint
  sca:
    name: "dependency audit"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"
      - name: Install dependency
        working-directory: ${{ matrix.component }}
        run: npm ci
      - name: NPM audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true
  Build:
    name: "Build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: sca
    permissions: 
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    outputs:
      image_tag: ${{ }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata label
        id: meta
        uses: docker/metadata-action@v5
        with:
          image: ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: 
          
          
          
          
        
        
        
        
      
    
  
        
        

    
    
